version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hmcts_tasks_db
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./hmcts-dev-test-backend
      dockerfile: Dockerfile
    container_name: hmcts_tasks_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tasks_db
      DB_USER_NAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./hmcts-dev-test-frontend
      dockerfile: Dockerfile
    container_name: hmcts_tasks_frontend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
    ports:
      - "3100:3100"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
